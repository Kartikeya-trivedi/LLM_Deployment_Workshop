<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Playground</title>
  <meta name="description" content="Chat with a deployed LLM — InferenceX Workshop" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ===== Reset ===== */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.03);
      --glass: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.14);
      --text: #e8ecf4;
      --text-dim: #7b8ba6;
      --text-faint: #4a5568;
      --accent: #818cf8;
      --accent2: #a78bfa;
      --accent-glow: rgba(99, 102, 241, 0.35);
      --user-bg: linear-gradient(135deg, rgba(99, 102, 241, 0.12), rgba(167, 139, 250, 0.08));
      --ai-bg: rgba(255, 255, 255, 0.03);
      --danger: #f87171;
      --success: #34d399;
      --radius: 16px;
      --radius-sm: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --shadow-lg: 0 24px 48px rgba(0, 0, 0, 0.4);
      --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.12), transparent),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(167, 139, 250, 0.08), transparent),
        radial-gradient(ellipse 40% 30% at 10% 60%, rgba(56, 189, 248, 0.04), transparent);
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      background: rgba(10, 14, 26, 0.7);
      flex-shrink: 0;
      z-index: 20;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      font-size: 17px;
      font-weight: 800;
      color: #fff;
      box-shadow: 0 0 24px var(--accent-glow);
      position: relative;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: calc(var(--radius-sm) + 2px);
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      opacity: 0.3;
      z-index: -1;
      filter: blur(8px);
    }

    .logo-text h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 60%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-text span {
      font-size: 0.7rem;
      color: var(--text-dim);
      font-weight: 500;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.65rem;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      background: rgba(52, 211, 153, 0.1);
      color: var(--success);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border: 1px solid rgba(52, 211, 153, 0.15);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.4);
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 6px rgba(52, 211, 153, 0);
      }
    }

    .badge {
      font-size: 0.6rem;
      padding: 5px 10px;
      border-radius: 20px;
      background: rgba(129, 140, 248, 0.1);
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(129, 140, 248, 0.12);
    }

    /* ===== Chat Area ===== */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 5px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Messages */
    .msg {
      max-width: 740px;
      width: fit-content;
      animation: msgIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .msg.user {
      align-self: flex-end;
    }

    .msg.ai {
      align-self: flex-start;
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .msg-avatar {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 700;
    }

    .msg.user .msg-avatar {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff;
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
    }

    .msg-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }

    .msg.user .msg-header {
      justify-content: flex-end;
    }

    .msg-bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.7;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--user-bg);
      border: 1px solid rgba(129, 140, 248, 0.1);
      border-bottom-right-radius: 6px;
    }

    .msg.ai .msg-bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
    }

    /* Welcome */
    .welcome {
      align-self: center;
      text-align: center;
      max-width: 520px;
      padding: 60px 24px;
      animation: msgIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      font-size: 28px;
      margin: 0 auto 20px;
      box-shadow: var(--shadow-glow);
    }

    .welcome h2 {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
      letter-spacing: -0.02em;
    }

    .welcome p {
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.65;
    }

    .welcome p .model-name {
      color: var(--accent);
      font-weight: 600;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 24px;
    }

    .suggestion {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--glass);
      color: var(--text-dim);
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(129, 140, 248, 0.06);
      transform: translateY(-1px);
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 5px;
      padding: 10px 0;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 0.6s infinite alternate;
      opacity: 0.6;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.12s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.24s;
    }

    @keyframes bounce {
      to {
        opacity: 1;
        transform: translateY(-5px);
      }
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.98);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ===== Markdown in bubbles ===== */
    .msg.ai .msg-bubble {
      white-space: normal;
    }

    .msg-bubble p {
      margin-bottom: 10px;
    }

    .msg-bubble p:last-child {
      margin-bottom: 0;
    }

    .msg-bubble code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.82rem;
      background: rgba(255, 255, 255, 0.07);
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .msg-bubble pre {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      margin: 10px 0;
      overflow-x: auto;
      position: relative;
    }

    .msg-bubble pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #c9d1d9;
    }

    .msg-bubble pre::-webkit-scrollbar {
      height: 4px;
    }

    .msg-bubble pre::-webkit-scrollbar-track {
      background: transparent;
    }

    .msg-bubble pre::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .msg-bubble ul,
    .msg-bubble ol {
      margin: 8px 0;
      padding-left: 20px;
    }

    .msg-bubble li {
      margin-bottom: 4px;
      line-height: 1.6;
    }

    .msg-bubble blockquote {
      border-left: 3px solid var(--accent);
      padding: 4px 14px;
      margin: 10px 0;
      color: var(--text-dim);
      background: rgba(129, 140, 248, 0.04);
      border-radius: 0 6px 6px 0;
    }

    .msg-bubble h1,
    .msg-bubble h2,
    .msg-bubble h3,
    .msg-bubble h4,
    .msg-bubble h5,
    .msg-bubble h6 {
      margin: 14px 0 6px;
      font-weight: 600;
      line-height: 1.4;
    }

    .msg-bubble h1 {
      font-size: 1.15rem;
    }

    .msg-bubble h2 {
      font-size: 1.05rem;
    }

    .msg-bubble h3 {
      font-size: 0.95rem;
    }

    .msg-bubble table {
      border-collapse: collapse;
      margin: 10px 0;
      width: 100%;
      font-size: 0.82rem;
    }

    .msg-bubble th,
    .msg-bubble td {
      padding: 6px 12px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .msg-bubble th {
      background: rgba(255, 255, 255, 0.04);
      font-weight: 600;
    }

    .msg-bubble strong {
      color: #f0f4ff;
    }

    .msg-bubble a {
      color: var(--accent);
      text-decoration: none;
    }

    .msg-bubble a:hover {
      text-decoration: underline;
    }

    .msg-bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    /* ===== Input Bar ===== */
    .input-bar {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: rgba(10, 14, 26, 0.8);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      padding: 16px 24px;
    }

    .controls {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-group label {
      font-size: 0.68rem;
      color: var(--text-faint);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .control-group input[type=range] {
      -webkit-appearance: none;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      outline: none;
      width: 90px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .control-group input[type=range]:hover {
      background: var(--border-hover);
    }

    .control-group input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent-glow);
      transition: transform 0.15s;
    }

    .control-group input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .control-group .val {
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      min-width: 30px;
      text-align: center;
    }

    .prompt-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #prompt {
      flex: 1;
      padding: 13px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      resize: none;
      min-height: 46px;
      max-height: 140px;
      transition: border-color 0.25s, box-shadow 0.25s;
      line-height: 1.5;
    }

    #prompt:focus {
      border-color: rgba(129, 140, 248, 0.4);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.08);
    }

    #prompt::placeholder {
      color: var(--text-faint);
    }

    #send {
      width: 46px;
      height: 46px;
      border-radius: var(--radius);
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    #send:hover {
      transform: translateY(-1px) scale(1.04);
      box-shadow: 0 6px 28px rgba(99, 102, 241, 0.4);
    }

    #send:active {
      transform: scale(0.95);
    }

    #send:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
    }

    .input-hint {
      font-size: 0.65rem;
      color: var(--text-faint);
    }

    .powered-by {
      font-size: 0.62rem;
      color: var(--text-faint);
    }

    .powered-by a {
      color: var(--text-dim);
      text-decoration: none;
    }

    .powered-by a:hover {
      color: var(--accent);
    }

    /* Error banner */
    .error-toast {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      background: rgba(248, 113, 113, 0.12);
      border: 1px solid rgba(248, 113, 113, 0.2);
      color: var(--danger);
      font-size: 0.8rem;
      font-weight: 500;
      z-index: 100;
      animation: toastIn 0.3s ease both;
      backdrop-filter: blur(12px);
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      header {
        padding: 12px 16px;
      }

      #chat {
        padding: 16px;
        gap: 14px;
      }

      .input-bar {
        padding: 12px 16px;
      }

      .msg {
        max-width: 100%;
      }

      .welcome {
        padding: 40px 16px;
      }

      .welcome h2 {
        font-size: 1.3rem;
      }

      .suggestions {
        gap: 6px;
      }

      .controls {
        gap: 12px;
      }
    }
  </style>
</head>

<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">IX</div>
      <div class="logo-text">
        <h1>InferenceX</h1>
        <span id="subtitle">Connecting...</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-pill" id="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">Connecting</span>
      </div>
      <div class="badge">Workshop</div>
    </div>
  </header>

  <!-- Chat -->
  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">&#x2728;</div>
      <h2>LLM Playground</h2>
      <p id="welcome-text">Loading model info...</p>
      <div class="suggestions" id="suggestions">
        <div class="suggestion" data-prompt="What is machine learning in simple terms?">What is ML?</div>
        <div class="suggestion" data-prompt="Write a Python function that checks if a string is a palindrome.">
          Palindrome code</div>
        <div class="suggestion" data-prompt="Explain the difference between AI, ML, and deep learning.">AI vs ML vs DL
        </div>
        <div class="suggestion" data-prompt="Give me 5 creative business ideas using AI.">AI business ideas</div>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <div class="controls">
      <div class="control-group">
        <label for="temperature">Temp</label>
        <input type="range" id="temperature" min="0" max="1.5" step="0.05" value="0.7" />
        <span class="val" id="temp-val">0.70</span>
      </div>
      <div class="control-group">
        <label for="max_tokens">Tokens</label>
        <input type="range" id="max_tokens" min="32" max="1024" step="32" value="256" />
        <span class="val" id="tok-val">256</span>
      </div>
    </div>
    <div class="prompt-row">
      <textarea id="prompt" rows="1" placeholder="Ask anything..."></textarea>
      <button id="send" title="Send (Enter)">&#10148;</button>
    </div>
    <div class="input-footer">
      <span class="input-hint">Enter to send &middot; Shift+Enter for new line</span>
      <span class="powered-by" id="powered-by"></span>
    </div>
  </div>

  <script>
    // ===== DOM refs =====
    const chat = document.getElementById('chat');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');
    const tempSlider = document.getElementById('temperature');
    const tokSlider = document.getElementById('max_tokens');
    const tempVal = document.getElementById('temp-val');
    const tokVal = document.getElementById('tok-val');

    let modelName = 'LLM';
    let backendType = '';

    // ===== Slider displays =====
    tempSlider.addEventListener('input', () => tempVal.textContent = parseFloat(tempSlider.value).toFixed(2));
    tokSlider.addEventListener('input', () => tokVal.textContent = tokSlider.value);

    // ===== Auto-resize textarea =====
    promptEl.addEventListener('input', () => {
      promptEl.style.height = 'auto';
      promptEl.style.height = Math.min(promptEl.scrollHeight, 140) + 'px';
    });

    // ===== Backend detection =====
    const isModal = window.location.hostname.endsWith('.modal.run');

    function getInfoUrl() {
      if (isModal) {
        return window.location.origin.replace(/-ui\.modal\.run/, '-info.modal.run');
      }
      return window.location.origin + '/info';
    }

    function getGenerateUrl() {
      if (isModal) {
        return window.location.origin.replace(/-ui\.modal\.run/, '-generate.modal.run');
      }
      return window.location.origin + '/generate';
    }

    // ===== Fetch model info on load =====
    async function fetchModelInfo() {
      try {
        const res = await fetch(getInfoUrl());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        modelName = data.model || 'LLM';
        backendType = data.backend || (isModal ? 'modal' : 'local');

        // Pretty-format model name: "Qwen/Qwen2.5-1.5B-Instruct" → "Qwen2.5-1.5B-Instruct"
        const shortName = modelName.includes('/') ? modelName.split('/').pop() : modelName;

        document.getElementById('subtitle').textContent = shortName;
        document.getElementById('status-text').textContent = 'Online';
        document.getElementById('welcome-text').innerHTML =
          `Running <span class="model-name">${shortName}</span> via ${backendType === 'modal' ? 'Modal + vLLM (cloud GPU)' : 'Ollama (local)'}.<br/>Type a prompt below to get started.`;
        document.getElementById('powered-by').innerHTML =
          backendType === 'modal'
            ? 'Powered by <a href="https://modal.com" target="_blank">Modal</a> + <a href="https://github.com/vllm-project/vllm" target="_blank">vLLM</a>'
            : 'Powered by <a href="https://ollama.com" target="_blank">Ollama</a>';
      } catch (e) {
        document.getElementById('subtitle').textContent = isModal ? 'Modal (cloud)' : 'Local';
        document.getElementById('status-text').textContent = 'Ready';
        document.getElementById('welcome-text').innerHTML =
          'Type a prompt below to get started.';
      }
    }

    fetchModelInfo();

    // ===== Suggestion clicks =====
    document.getElementById('suggestions').addEventListener('click', (e) => {
      const btn = e.target.closest('.suggestion');
      if (!btn) return;
      promptEl.value = btn.dataset.prompt;
      promptEl.dispatchEvent(new Event('input'));
      send();
    });

    // ===== Message helpers =====
    function addMessage(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const wrapper = document.createElement('div');
      wrapper.className = `msg ${role}`;

      const header = document.createElement('div');
      header.className = 'msg-header';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? 'U' : 'AI';

      const label = document.createElement('div');
      label.className = 'msg-label';
      const shortName = modelName.includes('/') ? modelName.split('/').pop() : modelName;
      label.textContent = role === 'user' ? 'You' : shortName;

      header.appendChild(avatar);
      header.appendChild(label);

      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      if (role === 'ai' && typeof marked !== 'undefined') {
        bubble.innerHTML = marked.parse(content);
      } else {
        bubble.textContent = content;
      }

      wrapper.appendChild(header);
      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    function addLoader() {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const wrapper = document.createElement('div');
      wrapper.className = 'msg ai';
      wrapper.id = 'loader';

      const header = document.createElement('div');
      header.className = 'msg-header';

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = 'AI';

      const label = document.createElement('div');
      label.className = 'msg-label';
      const shortName = modelName.includes('/') ? modelName.split('/').pop() : modelName;
      label.textContent = shortName;

      header.appendChild(avatar);
      header.appendChild(label);

      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';

      wrapper.appendChild(header);
      wrapper.appendChild(typing);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeLoader() {
      const el = document.getElementById('loader');
      if (el) el.remove();
    }

    function showError(msg) {
      const old = document.querySelector('.error-toast');
      if (old) old.remove();
      const toast = document.createElement('div');
      toast.className = 'error-toast';
      toast.textContent = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 5000);
    }

    // ===== Send =====
    async function send() {
      const text = promptEl.value.trim();
      if (!text) return;

      addMessage('user', text);
      promptEl.value = '';
      promptEl.style.height = 'auto';
      sendBtn.disabled = true;
      addLoader();

      try {
        const res = await fetch(getGenerateUrl(), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            prompt: text,
            temperature: parseFloat(tempSlider.value),
            max_tokens: parseInt(tokSlider.value),
          }),
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();
        removeLoader();
        addMessage('ai', data.response);
      } catch (err) {
        removeLoader();
        showError(`Failed to get response: ${err.message}`);
        addMessage('ai', `Error: ${err.message}`);
      } finally {
        sendBtn.disabled = false;
        promptEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    promptEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    // Focus prompt on load
    promptEl.focus();
  </script>
</body>

</html>
